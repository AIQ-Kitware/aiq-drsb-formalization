# formalization.yaml (v0.3): repo-root metadata for an AI-assisted formalization project.
# Schema reference: https://github.com/mathlib-initiative/formalization.yaml

version: "v0.3"

project:
  name: "AIQ DRSB formalization: distributionally-robust Schrödinger-bridge worst-case cost bounds"
  authors:
    - "Jon Crall"
  license: "Apache-2.0"
  repository: "https://github.com/AIQ-Kitware/aiq-drsb-formalization"
  description: >
    Lean 4 scaffold for the theorems underlying the GaTech DRSB (Distributionally-
    Robust Schrödinger Bridge) TA1 evaluation cards. The DRSB manuscript is
    unpublished; this project formalizes the *published* theorems the DRSB claims
    compose (Schrödinger-bridge / stochastic-optimal-control value function,
    Wasserstein- and Sinkhorn-DRO strong duality, and the Donsker–Varadhan / Gibbs
    root under the Sinkhorn dual), then a capstone that states the two DRSB worst-case
    cost bounds in those terms.
    Prose transcriptions of every source are in `prose/` (source PDFs in
    `prose/papers/`, git-ignored).

# The DRSB evaluation cards this formalization targets (in the aiq-eval-runner repo).
targets:
  cards:
    - "ta1/GaTech-DRSBM/magnet_eval/cards/wdrsb_cost_bound.yaml"   # E_μ[V] ≤ E_wc[V], μ in a Wasserstein-2 ball
    - "ta1/GaTech-DRSBM/magnet_eval/cards/sdrsb_cost_bound.yaml"   # same, Sinkhorn-divergence ball
  claim: "E_perturbed[V(x)] ≤ E_worst-case[V(x)] for V(x) = E[∫₀¹ ½‖u‖² dt + ρ g(X₁) | X₀=x]"

sources:
  - id: "Chen, Georgiou & Pavon 2021"
    title: "Stochastic control liaisons: Richard Sinkhorn meets Gaspard Monge on a Schrödinger bridge"
    authors: ["Chen", "Georgiou", "Pavon"]
    venue: "SIAM Review 63(2), 2021"
    arxiv: "2005.10963"
    role: "SB ⇄ SOC ⇄ entropic-OT; defines the value function V and optimal control u* = ∇log φ."
    prose: "prose/schrodinger-bridge-soc-ot.md"
    library: "ChenGeorgiouPavon2021"
  - id: "Léonard 2014"
    title: "A survey of the Schrödinger problem and some of its connections with optimal transport"
    authors: ["Léonard"]
    arxiv: "1308.0215"
    role: "Schrödinger problem as entropy minimization; Γ-convergence to optimal transport."
    prose: "prose/schrodinger-bridge-soc-ot.md"
    library: null   # provenance-only in this pass (overlaps ChenGeorgiouPavon2021)
  - id: "Shi, De Bortoli, Campbell & Doucet 2023 (DSBM)"
    title: "Diffusion Schrödinger Bridge Matching"
    venue: "NeurIPS 2023"
    arxiv: "2303.16852"
    role: "Iterative Markovian Fitting (the matching estimator / BridgeMatcher)."
    prose: "prose/sb-matching-generative.md"
    library: null   # generative-estimator provenance; no theorem library in this pass
  - id: "Liu, Lipman, Nickel, Karrer, Theodorou & Chen 2024 (GSBM)"
    title: "Generalized Schrödinger Bridge Matching"
    venue: "ICLR 2024"
    arxiv: "2310.02233"
    role: "Soft terminal / state cost SOC — the source of the DRSB terminal cost ρ·g(X₁)."
    prose: "prose/sb-matching-generative.md"
    library: null
  - id: "Domingo-Enrich, Drozdzal, Karrer & Chen 2025 (Adjoint Matching)"
    title: "Adjoint Matching: Fine-tuning Flow and Diffusion Generative Models with Memoryless SOC"
    venue: "ICLR 2025"
    arxiv: "2409.08861"
    role: "Reward fine-tuning as SOC; the AdjointMatcher loss E‖u^θ + ∇g^φ‖²."
    prose: "prose/sb-matching-generative.md"
    library: null
  - id: "Blanchet & Murthy 2019"
    title: "Quantifying Distributional Model Risk via Optimal Transport"
    venue: "Mathematics of Operations Research 44(2), 2019"
    arxiv: "1604.01446"
    role: "Optimal-transport / Wasserstein DRO strong duality (the primary duality result)."
    prose: "prose/wasserstein-dro-duality.md"
    library: "BlanchetMurthy2019"
  - id: "Gao & Kleywegt 2023"
    title: "Distributionally Robust Stochastic Optimization with Wasserstein Distance"
    venue: "Mathematics of Operations Research 48(2), 2023"
    arxiv: "1604.02199"
    role: "Wasserstein DRO strong duality + worst-case distribution structure."
    prose: "prose/wasserstein-dro-duality.md"
    library: "GaoKleywegt2023"
  - id: "Mohajerin Esfahani & Kuhn 2018"
    title: "Data-driven Distributionally Robust Optimization Using the Wasserstein Metric"
    venue: "Mathematical Programming 171, 2018"
    arxiv: "1505.05116"
    role: "Data-driven (empirical-nominal) Wasserstein DRO convex reformulation."
    prose: "prose/wasserstein-dro-duality.md"
    library: "MohajerinEsfahaniKuhn2018"
  - id: "Wang, Gao & Xie 2023"
    title: "Sinkhorn Distributionally Robust Optimization"
    venue: "Operations Research, 2023"
    arxiv: "2109.11926"
    role: "Sinkhorn (entropic) DRO strong duality; the log-partition dual behind DRSB Eq. 47."
    prose: "prose/sinkhorn-dro-duality.md"
    library: "WangGaoXie2023"
  - id: "DRSB manuscript (unpublished)"
    title: "Distributionally-Robust Schrödinger Bridge (drsbm_paper)"
    authors: ["GaTech team (contact: Jinhwan Sul)"]
    role: "The team's own worst-case cost bound (Eq. 47); NOT public."
    prose: "prose/README.md"
    library: "Drsb"   # capstone, composed from the libraries above

status:
  phase: "BOTH cards + ALL strong-duality EQUALITIES (GaoKleywegt/WangGaoXie/BlanchetMurthy + both Drsb capstones) PROVED, each modulo one explicit OT-attainment edge; 14 sorry, all genuine T4 (SDE/PDE, worst-case structure/measurable selection, Mohajerin, finite Sinkhorn scaling) or primal_feasible_iff"
  policy: >
    First pass established theorem STATEMENTS as close to the published results as
    possible (verified against prose/). The proof pass discharges the tractable/
    self-contained leaves and the card `≤` (weak-duality) direction, while the
    research-grade strong-duality `≥` (attainment) seams stay `sorry` (they need OT
    measurable-selection not in Mathlib — see AGENTS.md §6). PROVED so far: the
    Donsker–Varadhan family + measure normalization (ForMathlib); the OT-DRO per-coupling
    weak-duality kernel (ForMathlib.OT.expect_le_dualIntegrand_add_lam_couplingCost,
    ported from reference/V4.lean) + WangGaoXie2023.sinkhorn_weak_duality_kernel (its
    entropic analogue, per-point DV integrated over p₀); and — the headline — **BOTH
    evaluation-card claims, Drsb.wdrsb_cost_bound and Drsb.sdrsb_cost_bound, axiom-clean**,
    each under explicit regularity + an attainment/disintegration edge hypothesis (the T4
    seam, stated not faked). Also WangGaoXie2023.exists_worstCase_gibbs,
    ChenGeorgiouPavon2021.staticSB_eq_entropicOT, BlanchetMurthy2019.wdro_strong_duality_dualFn.
    Both cards need only the `≤` direction, so the strong-duality `≥` seams remain `sorry`.
    The earlier hand-written attempts are quarantined in `reference/` — reference-only.
  build:
    toolchain: "leanprover/lean4:v4.31.0-rc2"
    mathlib_rev: "476fb97b621c68d5d9709822416356273c1785cf"
    command: "lake exe cache get && lake build"
    expectation: "builds green; every leaf theorem emits exactly one `declaration uses 'sorry'` warning."
  libraries:
    - name: "ForMathlib"
      role: "Paper-agnostic staging (Mathlib-upstreaming queue): Donsker–Varadhan variational formula; measure normalization; shared OT/DRO vocabulary (couplings, transport cost, Wasserstein-2 & Sinkhorn balls, KL, DRO worst-case value)."
      note: "PROVED: the DV family (axiom-clean, ported from reference/WellKnown.lean) and Normalization.isProbabilityMeasure_inv_univ_smul (finite nonzero measure → probability; a genuine Mathlib gap, consumed by WangGaoXie2023.exists_worstCase_gibbs). The OT/DRO vocabulary is definitions-only. See PROOF_PIPELINE.md §3 for the upstreaming queue (WeakDuality, SinkhornScaling next)."
    - name: "ChenGeorgiouPavon2021"
      role: "SB/SOC value function + optimal control u* = ∇log φ (abstract dynamics interface)."
    - name: "BlanchetMurthy2019"
      role: "Wasserstein DRO strong duality (primary)."
      note: "wdro_strong_duality_dualFn is PROVED (the Lc-form of wdro_strong_duality, derived from it by defeq); the load-bearing wdro_strong_duality itself is still `sorry` (strong-duality ≥ seam)."
    - name: "GaoKleywegt2023"
      role: "Wasserstein DRO strong duality + worst-case distribution."
    - name: "MohajerinEsfahaniKuhn2018"
      role: "Data-driven Wasserstein DRO convex reformulation."
    - name: "WangGaoXie2023"
      role: "Sinkhorn DRO strong duality (log-partition dual; DRSB Eq. 47)."
      note: "logPartition_eq_gibbs_sSup, worstCase_conditional_tilted, and exists_worstCase_gibbs (Remark-4 Gibbs worst case, by measure normalization) are PROVED; strong_duality (Thm 1(II)) is still `sorry`. primal_feasible_iff is `sorry` AND likely mis-stated — see fidelity.known_limitations."
    - name: "Drsb"
      role: "Capstone: value function V, WDRSB & SDRSB worst-case cost bound (Eq. 47) — composed from the libraries above."

main_results:
  note: >
    Leaf theorem statements per library, with the prose file + printed source number
    each encodes. All bodies are `sorry` (first pass). See each `<Library>/Basic.lean`
    docstring for full hypotheses and any documented weakening/abstraction.
  ForMathlib:
    - declaration: "ForMathlib.MeasureTheory.integral_le_klDiv_add_log_integral_exp"
      informal: "Donsker–Varadhan inequality: ∫ f dμ ≤ KL(μ‖ν) + log ∫ exp f dν."
      proved: true   # axiom-clean port from reference/WellKnown.lean
    - declaration: "ForMathlib.MeasureTheory.log_integral_exp_eq_sSup"
      informal: "Donsker–Varadhan variational (Gibbs) identity."
      proved: true
    - declaration: "ForMathlib.MeasureTheory.isProbabilityMeasure_inv_univ_smul"
      informal: "Normalize a finite nonzero measure to a probability measure: IsProbabilityMeasure ((μ univ)⁻¹ • μ)."
      proved: true   # first ForMathlib pipeline extraction; Mathlib gap (only tilted_const' indirectly)
    - declaration: "ForMathlib.OT.expect_le_dualIntegrand_add_lam_couplingCost"
      informal: "Per-coupling Lagrangian bound — the always-true ≤ half of OT-DRO duality (Chain 1 weak node)."
      proved: true   # ported from reference/V4.lean (wdro_lagrangian_bound), generalized to arbitrary cost c; the reusable kernel behind the card cost bounds. See FOUNDATIONS.md Chain 1.
    - declaration: "ForMathlib.sinkhorn_potentials_exist"
      informal: "Sinkhorn / matrix-scaling existence — positive discrete Schrödinger potentials (Chain 3 top)."
      note: "STAGED (sorry). Self-contained finite-dim; Mathlib has Birkhoff/doubly-stochastic but not scaling. Adds mass-conservation hyp ∑pᵢ=∑qⱼ (necessary). ChenGeorgiouPavon2021.sinkhorn_potentials_exist now delegates here. See FOUNDATIONS.md Chain 3."
    - declaration: "ForMathlib.OT.{expect,klReal,otCost,W2sq,wassersteinBall,Wkappa,sinkhornBall,droValue}"
      informal: "Shared OT/DRO vocabulary (object definitions, no theorems)."
  ChenGeorgiouPavon2021:
    - declaration: "ChenGeorgiouPavon2021.schrodingerBridge_KL_eq_SOC"
      source: "Chen–Georgiou–Pavon Problem 4.1 ⇄ Problem 4.3 (eq. 4.19)"
    - declaration: "ChenGeorgiouPavon2021.optimal_control_eq_grad_log"
      source: "eq. (4.21): u* = ∇log φ"
    - declaration: "ChenGeorgiouPavon2021.optimal_control_eq_sigma_grad_log"
      source: "Theorem 5.2, eq. (5.11a): u* = σ²∇log φ"
    - declaration: "ChenGeorgiouPavon2021.optimal_control_eq_neg_grad_value"
      source: "DRSB reconciliation u*(0,x) = −∇V(x) under V = −log φ"
      note: "PROVED from optimal_control_eq_grad_log (still sorry) + hVlogφ + an added grad-negation edge ∇(−V)=−∇V. Depends on the grad_log sorry."
    - declaration: "ChenGeorgiouPavon2021.schrodingerBridge_KL_eq_SOC"
      source: "Problem 4.1 ⇄ 4.3 — KL⇄SOC equivalence"
      note: "PROVED via sInf-translation of the value sets by the constant endpoint entropy. Depends on energy_identity (Girsanov, still sorry) + added hne (feasible set nonempty)."
    - declaration: "ChenGeorgiouPavon2021.staticSB_eq_entropicOT"
      source: "§7, eq. (7.13): static SB = entropic OT"
      proved: true   # T0 — when the endpoint law IS the entropic-OT reference (hgibbs), the two sInfs coincide
  BlanchetMurthy2019:
    - declaration: "BlanchetMurthy2019.wdro_strong_duality"
      source: "Theorem 1(a),(b) via Remark 1, eq. (9) — Wasserstein DRO univariate dual"
    - declaration: "BlanchetMurthy2019.wdro_strong_duality_dualFn"
      source: "Theorem 1(b) + Remark 1, eq. (9) — same dual, per-sample term written as the inner dual φ_λ = Lc"
      proved: true   # defeq to wdro_strong_duality (Lc unfolds to the explicit sup); derived from it, not independently proved
  GaoKleywegt2023:
    - declaration: "GaoKleywegt2023.weak_duality_prop1"
      source: "Proposition 1 (weak duality, v_P ≤ v_D)"
      proved: true   # axiom-clean. csSup_le/le_csInf + per-coupling kernel + coupling ε-approx; Φ↔sup-form via Real.sSup_neg. Honest edges hfeas/hbdd/hφint/hΨμ/hOT.
    - declaration: "GaoKleywegt2023.strong_duality_thm1"
      source: "Theorem 1 (strong duality, κ<∞)"
      proved: true   # axiom-clean. le_antisymm(weak_duality_prop1, attainment). The ≥ is a single explicit attainment edge — isolates the whole strong-duality gap to that OT measurable-selection fact.
    - declaration: "GaoKleywegt2023.worstCase_structure_cor1"
      source: "Corollary 1(ii), eq. (27) — worst-case as 2-map transport"
    - declaration: "GaoKleywegt2023.dataDriven_worstCase_cor2ii"
      source: "Corollary 2(ii), eq. (29) — ≤ N+1-atom empirical worst case"
  MohajerinEsfahaniKuhn2018:
    - declaration: "MohajerinEsfahaniKuhn2018.worstCaseExpectation_eq_dual"
      source: "Theorem 4.2 (via proof eq. (12b)) — data-driven Wasserstein dual"
    - declaration: "MohajerinEsfahaniKuhn2018.worstCase_program"
      source: "Theorem 4.4, eq. (13) — finite convex worst-case program"
    - declaration: "MohajerinEsfahaniKuhn2018.worstCase_exists"
      source: "Corollary 4.6 — discrete worst-case law on atoms ξ̂ᵢ − qᵢₖ/αᵢₖ"
  WangGaoXie2023:
    - declaration: "WangGaoXie2023.strong_duality"
      source: "Theorem 1(II) — Sinkhorn-DRO log-partition dual (DRSB Eq. 47 source)"
    - declaration: "WangGaoXie2023.exists_worstCase_gibbs"
      source: "Remark 4 — continuous Gibbs (exponential-tilt) worst case"
      proved: true   # normalize the finite, nonzero unnormalized Gibbs measure to a probability measure
  Drsb:
    - declaration: "Drsb.wdrsb_cost_bound"
      informal: "𝔼_μ[V] ≤ WDRO dual worst-case — the wdrsb_cost_bound.yaml card claim."
      proved: true   # axiom-clean (propext/Classical.choice/Quot.sound). The ≤/weak-duality direction — all the card needs. Composes ForMathlib.OT.expect_le_dualIntegrand_add_lam_couplingCost with sqCost symmetry; regularity + OT-attainment (hOT) as explicit hypotheses (the T4 seam, not faked).
    - declaration: "Drsb.sdrsb_cost_bound"
      informal: "𝔼_μ[V] ≤ Sinkhorn dual worst-case — the sdrsb_cost_bound.yaml card claim."
      proved: true   # axiom-clean. The ≤/weak-duality direction, entropic analogue of wdrsb_cost_bound. Composes the proved WangGaoXie2023.sinkhorn_weak_duality_kernel (per-point Gibbs/DV bound integrated over p₀) with budget ≤ ε; hypotheses: hκ>0, the Sinkhorn attainment+disintegration edge hSink, dual over 0<lam (lam=0 gives junk logPartition — ess-sup convention unencoded). Ball uses the audit-fixed external ν."
    - declaration: "WangGaoXie2023.sinkhorn_weak_duality_kernel"
      informal: "Sinkhorn per-conditional-family weak-duality kernel: ∫_{p₀} 𝔼_{P_x}[f] ≤ λ·(disintegrated budget) + 𝔼_{p₀}[logPartition]."
      proved: true   # axiom-clean. Per-point Donsker–Varadhan bound (ForMathlib engine) integrated over p₀; the entropic analogue of ForMathlib.OT.expect_le_dualIntegrand_add_lam_couplingCost. Candidate for ForMathlib generalization.
    - declaration: "Drsb.eq47Bound"
      informal: "DRSB 'Eq. 47' bound = E_wc[V] − ρ·log 𝔼_ν[e^g] (from GaTech code; unpublished)."

fidelity:
  known_limitations:
    - "Many proofs are `sorry`, but the card `≤`/weak-duality path is landing: PROVED = Donsker–Varadhan family + measure Normalization + the OT-DRO weak-duality kernel (ForMathlib.OT.expect_le_dualIntegrand_add_lam_couplingCost) + **Drsb.wdrsb_cost_bound (the WDRSB evaluation-card claim, axiom-clean)** + WangGaoXie2023.{logPartition_eq_gibbs_sSup, worstCase_conditional_tilted, exists_worstCase_gibbs} + ChenGeorgiouPavon2021.staticSB_eq_entropicOT + BlanchetMurthy2019.wdro_strong_duality_dualFn. The research-grade strong-duality `≥` (attainment) seams remain `sorry`."
    - "The DRSB manuscript is unpublished; its internal 'Eq. 47' and 'Algorithm 5' numbers come from the GaTech code, not a published PDF (flagged in prose/ and in the Drsb capstone)."
    - "Heavy analysis objects (SDE path measures, controlled dynamics) are captured via abstract `structure` interfaces, not built from Mathlib SDE theory (which does not exist yet)."
    - "Statements were AI-drafted against prose transcriptions; they still need expert review against the primary sources."
    - "SINKHORN AUDIT (2026-07, FIXED): the Sinkhorn ball (ForMathlib.OT.Wkappa/sinkhornBall) used KL against the product of the two coupling marginals (μ⊗μ̂), but Wang–Gao–Xie Def 1 uses KL against the nominal times an EXTERNAL reference ν (μ̂⊗ν) — the same ν the dual integrates over. The ball and dual referenced different measures, making strong_duality/sdrsb_*/primal_feasible_iff inconsistent. FIXED: Wkappa/sinkhornBall now carry ν and consumers thread it (see prose/sinkhorn-dro-duality.md audit note)."
    - "WangGaoXie2023.primal_feasible_iff still `sorry`: with the OLD marginal-product reference it was outright false; with the corrected external-ν ball it is the paper's Theorem 1(I) but its proof (KL-nonnegativity + Lemma-2 reformulation) is not yet done. Re-confirm the statement against the corrected ball before proving."

automation:
  methods:
    - method: "agent"
      description: "AI-drafted Lean statements + prose transcriptions, human-coordinated."
      models:
        - "Claude Opus 4.8 (1M context) — scaffolding, prose transcription, statement drafting"
      framework: "Coordinated LLM sessions with local `lake` type-checking against a pinned Mathlib."
      review_status: "Statements type-check against Mathlib; the Donsker–Varadhan family in ForMathlib is proved (axiom-clean, ported from reference/WellKnown.lean); remaining leaves are `sorry`. Not yet reviewed by a Lean/subject-matter expert."
  resource_accounting:
    rationale: >
      Every commit here is produced by an LLM agent; this block makes the climate
      cost of that work legible. Token counts and model are MEASURED verbatim from
      each agent's session transcript (deduped by message id — the transcript logs a
      message several times with identical usage, so a naive record-sum overcounts
      ~2.6x). A time estimate is derived; energy and carbon are DEFERRED, computed in
      a later pass from the recorded tokens/time and the commit timestamp (which fixes
      the grid's carbon intensity — "how dirty was it" — at that moment).
    schema: "resource-ledger/v1"
    module: "dev/resource_tally/            # self-contained, copy-pasteable (see its README.md)"
    tool: "dev/resource_tally/resource_tally.py"
    ledger: "dev/resource_tally/data/resource-ledger.jsonl"
    lifetime_totals_file: "dev/resource_tally/data/lifetime-totals.yaml"
    unit: "per git commit, attributed per agent session (concurrency-safe; append-only; no double-count, no undercount)"
    measured:
      - "model"
      - "input / cache_write / cache_read / output tokens (deduped by message id)"
      - "server tool calls (web_search, web_fetch)"
      - "wall_clock span of the attributed turns"
    estimated:
      inference_seconds: "output_tokens ÷ throughput (assumption set below)"
    deferred:
      energy_kwh: "from inference_seconds × device_power × PUE, or tokens × per-token energy (factor set TBD)"
      carbon_gco2e: "energy_kwh × grid_intensity(commit_ts, region)"
    assumptions:
      time-v0:
        throughput_tok_per_s: 55
        note: "placeholder Opus-class decode rate; UNVALIDATED — replace with a measured value, then recompute the ledger from transcripts"
    # BEGIN lifetime_totals (auto-generated; do not edit by hand)
