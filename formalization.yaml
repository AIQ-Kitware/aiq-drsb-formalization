status:
  phase: "statements complete; proofs ‚Äî foundational leaves landing"
  policy: >
    First pass established theorem STATEMENTS as close to the published results as
    possible (verified against prose/, not a prior attempt). The proof pass has now
    begun, foundational-first: the tractable/self-contained leaves are being discharged
    while the research-grade strong-duality `‚â•` (attainment) seams stay `sorry` (they
    need OT measurable-selection / worst-case-measure constructions not in Mathlib ‚Äî
    see AGENTS.md ¬ß6). Proved so far: the Donsker‚ÄìVaradhan family (ForMathlib), the
    Sinkhorn continuous-Gibbs worst-case existence (WangGaoXie2023.exists_worstCase_gibbs,
    a measure-normalization), and the Lc-form dual equivalence
    (BlanchetMurthy2019.wdro_strong_duality_dualFn, derived from its sibling). The
    earlier hand-written attempts are quarantined in `reference/` (see reference/README.md)
    and are reference-only ‚Äî they contain subtle traps and must not be trusted as canon.
  build:
    toolchain: "leanprover/lean4:v4.31.0-rc2"
    mathlib_rev: "476fb97b621c68d5d9709822416356273c1785cf"
    command: "lake exe cache get && lake build"
    expectation: "builds green; every leaf theorem emits exactly one `declaration uses 'sorry'` warning."
  libraries:
    - name: "ForMathlib"
      role: "Paper-agnostic staging: Donsker‚ÄìVaradhan variational formula; shared OT/DRO vocabulary (couplings, transport cost, Wasserstein-2 & Sinkhorn balls, KL, DRO worst-case value)."
      note: "DV theorems are PROVED (axiom-clean, ported from reference/WellKnown.lean); the OT/DRO vocabulary is definitions-only."
    - name: "ChenGeorgiouPavon2021"
      role: "SB/SOC value function + optimal control u* = ‚àálog œÜ (abstract dynamics interface)."
    - name: "BlanchetMurthy2019"
      role: "Wasserstein DRO strong duality (primary)."
      note: "wdro_strong_duality_dualFn is PROVED (the Lc-form of wdro_strong_duality, derived from it by defeq); the load-bearing wdro_strong_duality itself is still `sorry` (strong-duality ‚â• seam)."
    - name: "GaoKleywegt2023"
      role: "Wasserstein DRO strong duality + worst-case distribution."
    - name: "MohajerinEsfahaniKuhn2018"
      role: "Data-driven Wasserstein DRO convex reformulation."
    - name: "WangGaoXie2023"
      role: "Sinkhorn DRO strong duality (log-partition dual; DRSB Eq. 47)."
      note: "logPartition_eq_gibbs_sSup, worstCase_conditional_tilted, and exists_worstCase_gibbs (Remark-4 Gibbs worst case, by measure normalization) are PROVED; strong_duality (Thm 1(II)) is still `sorry`. primal_feasible_iff is `sorry` AND likely mis-stated ‚Äî see fidelity.known_limitations."
    - name: "Drsb"
      role: "Capstone: value function V, WDRSB & SDRSB worst-case cost bound (Eq. 47) ‚Äî composed from the libraries above."

