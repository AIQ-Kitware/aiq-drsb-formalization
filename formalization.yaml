    comparator_configs:
      - "comparator/candidate-01-donsker-varadhan.json"
      - "comparator/candidate-02-kl-convexity.json"
      - "comparator/candidate-03-supergradient.json"
      - "comparator/pending-gibbs-tilt.json"
      - "comparator/pending-kl-chain-rule.json"
      - "comparator/pending-kl-lsc.json"
      - "comparator/pending-measurable-argmax.json"
      - "comparator/pending-integrable-integral-compprod.json"
  libraries:
    - name: "ForMathlib"
      role: "Paper-agnostic staging (Mathlib-upstreaming queue): Donsker–Varadhan variational formula; measure normalization; shared OT/DRO vocabulary (couplings, transport cost, Wasserstein-2 & Sinkhorn balls, KL, DRO worst-case value)."
      note: >-
        PROVED (dependency-clean). Beyond the earlier DV family, Normalization, both weak-duality
        kernels and the finite Sinkhorn/matrix scaling, this now stages the machinery that closed the
        strong-duality gap: klDiv_mix_le (convexity of KL in its first argument, ℝ≥0∞-valued and
        hypothesis-free), tiltedKernel (the parametrized/kernel form of Measure.tilted),
        entropic_gibbs_attained_tilted, exists_supergradient_of_concaveOn, exists_measurable_eps_argmax_of_separable,
        klDiv_compProd_eq_lintegral, integrable_integral_compProd, and the two converse Lagrangian bounds
        (exists_coupling_lagrangian_ge, exists_coupling_sinkhorn_lagrangian_eq). Upstream candidates are
        exposed as comparator challenges under Challenge/ — see Challenge/README.md for the verified
        Mathlib-gap claims.
    - name: "ChenGeorgiouPavon2021"
      role: "SB/SOC value function + optimal control u* = ∇log φ (abstract dynamics interface)."
      note: "Module split checkpoint (GPT-5.5 Thinking, 2026-07-08): public aggregates remain stable, but theorem libraries are now split more finely. `ForMathlib.MeasureTheory.GaussianCameronMartin` aggregates sequence-product, energy, finite-KL, infinite-KL, density, and absolute-continuity modules. `ChenGeorgiouPavon2021.Basic` aggregates split CGP modules; `Continuum.WienerDyadic`, `Continuum.Closure`, and `SocOt` are themselves aggregate imports over topic modules. Fresh validation should use `dev/check_cgp_module_split.sh`. Future placeholders should mark missing mathematical targets only, not downstream assembly lemmas."
    - name: "BlanchetMurthy2019"
      role: "Wasserstein DRO strong duality (primary)."
      note: "wdro_strong_duality and its Lc-form wdro_strong_duality_dualFn are both PROVED. The strong-duality ≥ seam is no longer a hypothesis: it is discharged by ForMathlib.OT.dualValue_le_droValue (Blanchet–Murthy Thm 1), assembled from a measurable ε-argmax selector (no Kuratowski–Ryll-Nardzewski needed), supergradient existence, and concavity of the DRO value function."
    - name: "GaoKleywegt2023"
      role: "Wasserstein DRO strong duality + worst-case distribution."
    - name: "MohajerinEsfahaniKuhn2018"
      role: "Data-driven Wasserstein DRO convex reformulation."
    - name: "WangGaoXie2023"
      role: "Sinkhorn DRO strong duality (log-partition dual; backs the SDRSB card's bound)."
      note: >-
        PROVED, and as of 2026-07-10 `strong_duality` (Thm 1(II)) carries **no `hge` edge**: the zero
        duality gap is discharged by sinkhornDual_le_droValue, whose converse Lagrangian bound is an
        *equality* with an explicit witness (γ = μ̂ ⊗ₘ P for the tilted kernel P) because the Gibbs
        Donsker–Varadhan supremum over measures is attained. What `hge` cost is a **Slater**
        (strict-feasibility) hypothesis: the entropic objective has no zero, so ε is interior to the
        value function's domain only when some coupling is strictly feasible. That hypothesis is proved
        satisfiable (ForMathlib.OT.exists_slater_of_couplingCost_prodCoupling_lt). Also proved:
        logPartition_eq_gibbs_sSup, worstCase_conditional_tilted, exists_worstCase_gibbs (Remark-4),
        sinkhorn_weak_duality_kernel, expect_le_sinkhornDualObjective, and
        primal_feasible_radius_nonneg (the honest necessity half; see fidelity.known_limitations).
    - name: "Drsb"
      role: "Capstone: value function V, WDRSB & SDRSB worst-case cost bounds (the card claims) — composed from the published libraries above."
      note: >-
        Both card claims (wdrsb_cost_bound, sdrsb_cost_bound) are EDGE-FREE. Both strong-duality
        capstones are proved: wdrsb_strong_duality_of_regularity and sdrsb_strong_duality (the latter
        under Slater, discharged concretely by sdrsb_strong_duality_of_radius_gt_independent_cost).
        sdrsb_cost_bound needs no second moments.

main_results:
  note: >
    Leaf theorem statements per library, with the prose file + printed source number
    each encodes. Current status is proof-pass/post-proof-pass, not first-pass-only: the repo is
    proved, and explicit remaining research content is isolated as named hypotheses/edges. See
    each `<Library>/Basic.lean` docstring for full hypotheses and documented weakening/abstraction.
  ForMathlib:
    - declaration: "ForMathlib.MeasureTheory.integral_le_klDiv_add_log_integral_exp"
      informal: "Donsker–Varadhan inequality: ∫ f dμ ≤ KL(μ‖ν) + log ∫ exp f dν."
      proved: true   # dependency-clean port from reference/WellKnown.lean
    - declaration: "ForMathlib.MeasureTheory.log_integral_exp_eq_sSup"
      informal: "Donsker–Varadhan variational (Gibbs) identity."
      proved: true
    - declaration: "ForMathlib.MeasureTheory.isProbabilityMeasure_inv_univ_smul"
      informal: "Normalize a finite nonzero measure to a probability measure: IsProbabilityMeasure ((μ univ)⁻¹ • μ)."
      proved: true   # first ForMathlib pipeline extraction; Mathlib gap (only tilted_const' indirectly)
    - declaration: "ForMathlib.OT.expect_le_dualIntegrand_add_lam_couplingCost"
      informal: "Per-coupling Lagrangian bound — the always-true ≤ half of OT-DRO duality (Chain 1 weak node)."
      proved: true   # ported from reference/V4.lean (wdro_lagrangian_bound), generalized to arbitrary cost c; the reusable kernel behind the card cost bounds. See FOUNDATIONS.md Chain 1.
    - declaration: "ForMathlib.OT.expect_le_dualIntegrand_add_lam_couplingCost_restrict"
      informal: "Ξ-restricted per-coupling Lagrangian bound — the P(Ξ) variant: when the source μ is Ξ-supported, the conjugate sup restricts to Ξ."
      proved: true   # dependency-clean. Same proof as the unrestricted kernel but the pointwise bound needs x∈Ξ (π-a.e., since the fst marginal μ is Ξ-supported, via ae_map_iff) ⇒ integral_mono_ae. Kernel behind MohajerinEsfahaniKuhn2018.worstCaseExpectation_eq_dual (Thm 4.2). Upstreamable alongside the unrestricted kernel.
    - declaration: "ForMathlib.MeasureTheory.toReal_klDiv_map_le"
      informal: "Data-processing inequality for KL divergence: KL(g#μ ‖ g#ν) ≤ KL(μ‖ν) for measurable g, finite KL(μ‖ν)."
      proved: true   # dependency-clean (propext/Classical.choice/Quot.sound). A GENUINE Mathlib gap — Mathlib has the KL chain rule but no DPI / f-divergence file. Proved by the textbook convex/Jensen argument: rnDeriv of a pushforward = conditional expectation (Mathlib toReal_rnDeriv_map), then conditional Jensen (ConvexOn.map_condExp_le) on the convex generator klFun (convexOn_klFun on Ici 0) + tower (integral_condExp). Consumed by ChenGeorgiouPavon2021.dynamic_eq_static_SB. Upstreamable as-is (ForMathlib/MeasureTheory/KLDataProcessing.lean).
    - declaration: "ForMathlib.matrix_scaling_exists"
      informal: "Matrix scaling / Sinkhorn existence — positive scalings a,b with aᵢ(∑ⱼGᵢⱼbⱼ)=pᵢ, bⱼ(∑ᵢGᵢⱼaᵢ)=qⱼ (Chain 3 top; the general lemma)."
      proved: true   # PROVED, dependency-clean (propext/Classical.choice/Quot.sound). Mathlib has NEITHER Brouwer NOR Birkhoff/Hilbert-metric contraction, so proved via log-domain convex minimization of ψ(b)=∑pᵢlog(∑Gᵢⱼbⱼ)−∑qⱼlog bⱼ over the open simplex: boundary blow-up gives compactness (EVT, no coercivity lemma), the marginal equations come from 1-D directional derivatives along eⱼ−eₖ (IsLocalMin.hasDerivAt_eq_zero), mass conservation ∑p=∑q kills the Lagrange multiplier. Staged for Mathlib upstreaming.
    - declaration: "ForMathlib.sinkhorn_potentials_exist"
      informal: "Sinkhorn / matrix-scaling existence — positive discrete Schrödinger potentials (Chain 3 top)."
      proved: true   # PROVED, dependency-clean. Short reduction to matrix_scaling_exists (φ0/φ̂1 are the row/column marginals). Adds mass-conservation hyp ∑pᵢ=∑qⱼ (necessary). ChenGeorgiouPavon2021.sinkhorn_potentials_exist delegates here (now proved). See FOUNDATIONS.md Chain 3.
    - declaration: "ForMathlib.OT.{expect,klReal,otCost,W2sq,wassersteinBall,Wkappa,sinkhornBall,droValue}"
      informal: "Shared OT/DRO vocabulary (object definitions, no theorems)."
    - declaration: "ForMathlib.MeasureTheory.klDiv_stdGaussian_map_add"
      informal: "Cameron–Martin relative entropy: KL((stdGaussian ι).map (·+h) ‖ stdGaussian ι) = ½∑ᵢ(hᵢ)² — the finite-dim / Euler–Maruyama core of CGP's energy identity (4.19)."
      proved: true   # dependency-clean (propext/Classical.choice/Quot.sound)
      provenance:
        status: "VENDORED"
        original_author: "Michael R. Douglas (mrdouglasny)"
        source_repo: "https://github.com/mrdouglasny/gibbs-variational"
        source_file: "GibbsVariational/GaussianEntropy.lean"
        source_commit: "75e08d8aaca83bb090fc43855898991fbfc9abf3"
        permalink: "https://github.com/mrdouglasny/gibbs-variational/blob/75e08d8aaca83bb090fc43855898991fbfc9abf3/GibbsVariational/GaussianEntropy.lean"
        license: "Apache-2.0"   # SPDX; compatible with ours (Apache-2.0)
        retrieved: "2026-07-03"
        adaptation: "verbatim; only the enclosing namespace changed (GibbsVariational → ForMathlib.MeasureTheory). Also vendors the supporting lemmas klDiv_gaussianReal_shift, klDiv_map_measurableEquiv, klDiv_prod, klDiv_pi, klDiv_pi_fintype, and the def stdGaussian, from the same file/commit. See ForMathlib/MeasureTheory/GaussianEntropy.lean header + README."
    - declaration: "ForMathlib.MeasureTheory.klDiv_emShift_eq_emEnergy"
      informal: "Euler–Maruyama discrete energy identity: (KL(controlled path law ‖ reference path law)).toReal = ∑ₖ Δt·½‖u_k‖² (the discrete control energy). ORIGINAL to this repo; built on the vendored klDiv_stdGaussian_map_add."
      proved: true   # dependency-clean; the discrete/Gaussian layer of CGP energy_identity (4.19) — the quantity the DRSB card measures (AGENTS §3). Remaining edge: the Δt→0 SDE limit (T4).
