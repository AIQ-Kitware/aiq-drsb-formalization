version: "v0.3"

project:
  name: "AIQ DRSB formalization: distributionally-robust Schr√∂dinger-bridge worst-case cost bounds"
  authors:
    - "Jon Crall"
  license: "Apache-2.0"
  repository: "https://github.com/AIQ-Kitware/aiq-drsb-formalization"
  description: >
    Lean 4 scaffold for the theorems underlying the GaTech DRSB (Distributionally-
    Robust Schr√∂dinger Bridge) TA1 evaluation cards. The DRSB manuscript is
    unpublished; this project formalizes the *published* theorems the DRSB claims
    compose (Schr√∂dinger-bridge / stochastic-optimal-control value function,
    Wasserstein- and Sinkhorn-DRO strong duality, and the Donsker‚ÄìVaradhan / Gibbs
    root under the Sinkhorn dual), then a capstone that states the two DRSB worst-case
    cost bounds in those terms.
    Prose transcriptions of every source are in `prose/` (source PDFs in
    `prose/papers/`, git-ignored).

# The DRSB evaluation cards this formalization targets (in the aiq-eval-runner repo).
targets:
