# formalization.yaml (v0.3): repo-root metadata for an AI-assisted formalization project.
# Schema reference: https://github.com/mathlib-initiative/formalization.yaml

version: "v0.3"

project:
  name: "AIQ DRSB formalization: distributionally-robust Schrödinger-bridge worst-case cost bounds"
  authors:
    - "Jon Crall"
    - "GPT-5.5 Thinking"
  license: "Apache-2.0"
  repository: "https://github.com/AIQ-Kitware/aiq-drsb-formalization"
  description: >
    Lean 4 scaffold for the theorem underlying the GaTech DRSB (Distributionally-
    Robust Schrödinger Bridge) TA1 evaluation cards. Anchored on the cards' empirical
    claim and the *published* theorems that claim composes (the GaTech team's own
    unpublished DRSB manuscript is NOT a source — ~0 weight, see fidelity.known_limitations)
    (Schrödinger-bridge / stochastic-optimal-control value function,
    Wasserstein- and Sinkhorn-DRO strong duality, and the Donsker–Varadhan / Gibbs
    root under the Sinkhorn dual), then a capstone that states the two DRSB worst-case
    cost bounds in those terms.
    Prose transcriptions of every source are in `prose/` (source PDFs in
    `prose/papers/`, git-ignored).

# The DRSB evaluation cards this formalization targets (in the aiq-eval-runner repo).
targets:
  cards:
    - "ta1/GaTech-DRSBM/magnet_eval/cards/wdrsb_cost_bound.yaml"   # E_μ[V] ≤ E_wc[V], μ in a Wasserstein-2 ball
    - "ta1/GaTech-DRSBM/magnet_eval/cards/sdrsb_cost_bound.yaml"   # same, Sinkhorn-divergence ball
  claim: "E_perturbed[V(x)] ≤ E_worst-case[V(x)] for V(x) = E[∫₀¹ ½‖u‖² dt + ρ g(X₁) | X₀=x]"

sources:
  - id: "Chen, Georgiou & Pavon 2021"
    title: "Stochastic control liaisons: Richard Sinkhorn meets Gaspard Monge on a Schrödinger bridge"
    authors: ["Chen", "Georgiou", "Pavon"]
    venue: "SIAM Review 63(2), 2021"
    arxiv: "2005.10963"
    role: "SB ⇄ SOC ⇄ entropic-OT; defines the value function V and optimal control u* = ∇log φ."
    prose: "prose/schrodinger-bridge-soc-ot.md"
    library: "ChenGeorgiouPavon2021"
  - id: "Léonard 2014"
    title: "A survey of the Schrödinger problem and some of its connections with optimal transport"
    authors: ["Léonard"]
    arxiv: "1308.0215"
    role: "Schrödinger problem as entropy minimization; Γ-convergence to optimal transport."
    prose: "prose/schrodinger-bridge-soc-ot.md"
    library: null   # provenance-only in this pass (overlaps ChenGeorgiouPavon2021)
  - id: "Shi, De Bortoli, Campbell & Doucet 2023 (DSBM)"
    title: "Diffusion Schrödinger Bridge Matching"
    venue: "NeurIPS 2023"
    arxiv: "2303.16852"
    role: "Iterative Markovian Fitting (the matching estimator / BridgeMatcher)."
    prose: "prose/sb-matching-generative.md"
    library: null   # generative-estimator provenance; no theorem library in this pass
  - id: "Liu, Lipman, Nickel, Karrer, Theodorou & Chen 2024 (GSBM)"
    title: "Generalized Schrödinger Bridge Matching"
    venue: "ICLR 2024"
    arxiv: "2310.02233"
    role: "Soft terminal / state cost SOC — the source of the DRSB terminal cost ρ·g(X₁)."
    prose: "prose/sb-matching-generative.md"
    library: null
  - id: "Domingo-Enrich, Drozdzal, Karrer & Chen 2025 (Adjoint Matching)"
    title: "Adjoint Matching: Fine-tuning Flow and Diffusion Generative Models with Memoryless SOC"
    venue: "ICLR 2025"
    arxiv: "2409.08861"
    role: "Reward fine-tuning as SOC; the AdjointMatcher loss E‖u^θ + ∇g^φ‖²."
    prose: "prose/sb-matching-generative.md"
    library: null
  - id: "Blanchet & Murthy 2019"
    title: "Quantifying Distributional Model Risk via Optimal Transport"
    venue: "Mathematics of Operations Research 44(2), 2019"
    arxiv: "1604.01446"
    role: "Optimal-transport / Wasserstein DRO strong duality (the primary duality result)."
    prose: "prose/wasserstein-dro-duality.md"
    library: "BlanchetMurthy2019"
  - id: "Gao & Kleywegt 2023"
    title: "Distributionally Robust Stochastic Optimization with Wasserstein Distance"
    venue: "Mathematics of Operations Research 48(2), 2023"
    arxiv: "1604.02199"
    role: "Wasserstein DRO strong duality + worst-case distribution structure."
    prose: "prose/wasserstein-dro-duality.md"
    library: "GaoKleywegt2023"
  - id: "Mohajerin Esfahani & Kuhn 2018"
    title: "Data-driven Distributionally Robust Optimization Using the Wasserstein Metric"
    venue: "Mathematical Programming 171, 2018"
    arxiv: "1505.05116"
    role: "Data-driven (empirical-nominal) Wasserstein DRO convex reformulation."
    prose: "prose/wasserstein-dro-duality.md"
    library: "MohajerinEsfahaniKuhn2018"
  - id: "Wang, Gao & Xie 2023"
    title: "Sinkhorn Distributionally Robust Optimization"
    venue: "Operations Research, 2023"
    arxiv: "2109.11926"
    role: "Sinkhorn (entropic) DRO strong duality; the published log-partition dual backing the SDRSB card's bound."
    prose: "prose/sinkhorn-dro-duality.md"
    library: "WangGaoXie2023"
  - id: "GaTech DRSB MAGNET evaluation cards"
    title: "wdrsb_cost_bound.yaml, sdrsb_cost_bound.yaml"
    role: "The deliverable being certified: the cards' empirical worst-case cost-bound claim E_μ[V] ≤ E_worst-case[V]. The Drsb capstone discharges it from the published sources above."
    location: "../../ta1/GaTech-DRSBM/magnet_eval/cards/"
    library: "Drsb"   # capstone, composed from the published libraries above

status:
  phase: >-
    PROVED, edge-free on the card path. Both MAGNET card claims (Drsb.wdrsb_cost_bound,
    Drsb.sdrsb_cost_bound) carry no edge hypotheses. All four strong-duality capstones are
    proved: the Wasserstein `hge` (zero duality gap) is discharged by
    ForMathlib.OT.dualValue_le_droValue (Blanchet-Murthy Thm 1), and the Sinkhorn `hge` by
    WangGaoXie2023.sinkhornDual_le_droValue, so neither WangGaoXie2023.strong_duality nor
    Drsb.sdrsb_strong_duality carries `hge` any more. The Sinkhorn proof required replacing
    `hge` with a *Slater* (strict-feasibility) hypothesis -- the entropic objective has no
    zero, so the Wasserstein diagonal-coupling trick does not transfer; that hypothesis is
    proved satisfiable by Drsb.sdrsb_strong_duality_of_radius_gt_independent_cost, which
    discharges it from the single inequality E_{p0 (x) nu}[c] < eps. Remaining research
    content is isolated in named, non-vacuous edges away from the card path: worst-case-measure
    *existence* (GaoKleywegt2023.worstCase_structure_cor1, MohajerinEsfahaniKuhn2018.worstCase_exists)
    and the continuum Girsanov/Cameron-Martin bridge (hCM), blocked on Mathlib's absent Ito
    integral. Build green (8761 jobs), zero warnings, zero `sorry`, zero `sorryAx`;
    `#lint`-clean under all 15 Batteries linters across every namespace.
  policy: >
    The first pass established theorem STATEMENTS as close to the published results as
    possible (verified against prose/). The proof pass then discharged them. As of
    2026-07-10 the strong-duality `>=` (zero-duality-gap) direction is PROVED, not
    hypothesised, in both the Wasserstein and the Sinkhorn setting; the earlier `hattain`
    (attaining worst-case measure) and `hge` hypotheses are gone from the capstones. Where a
    hypothesis remains it is (a) named, (b) strictly weaker than what it replaced, and
    (c) proved satisfiable rather than merely asserted -- e.g. the Sinkhorn Slater condition.
    Reusable, paper-agnostic results are staged in ForMathlib/ and exposed as comparator
    challenges under Challenge/ (see Challenge/README.md). The earlier hand-written attempts
    are quarantined in `reference/` -- reference-only.
