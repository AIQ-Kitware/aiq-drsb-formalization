fidelity:
  known_limitations:
    - "Most proofs are `sorry`; the foundational/self-contained leaves are proved (Donsker‚ÄìVaradhan family in ForMathlib; WangGaoXie2023.{logPartition_eq_gibbs_sSup, worstCase_conditional_tilted, exists_worstCase_gibbs}; BlanchetMurthy2019.wdro_strong_duality_dualFn). The research-grade strong-duality `‚â•` (attainment) seams remain `sorry`."
    - "The DRSB manuscript is unpublished; its internal 'Eq. 47' and 'Algorithm 5' numbers come from the GaTech code, not a published PDF (flagged in prose/ and in the Drsb capstone)."
    - "Heavy analysis objects (SDE path measures, controlled dynamics) are captured via abstract `structure` interfaces, not built from Mathlib SDE theory (which does not exist yet)."
    - "Statements were AI-drafted against prose transcriptions; they still need expert review against the primary sources."
    - "SUSPECTED STATEMENT BUG: WangGaoXie2023.primal_feasible_iff ((sinkhornBall Œºhat Œ∫ Œµ).Nonempty ‚Üî 0 ‚â§ Œµ) is likely false for the ForMathlib.OT definitions ‚Äî for a non-degenerate nominal, Wkappa Œ∫ Œºhat Œºhat > 0 (product coupling has positive squared cost; the diagonal coupling has infinite KL vs the product), so at Œµ = 0 the RHS holds but the ball is empty. The paper's Sinkhorn discrepancy has W(P,P)=0 under a conditional/different definition than the coupling-based Wkappa encoded here. Left `sorry`; needs a prose re-derivation of the feasibility statement, not a proof."

automation:
  methods:
    - method: "agent"
      description: "AI-drafted Lean statements + prose transcriptions, human-coordinated."
      models:
        - "Claude Opus 4.8 (1M context) ‚Äî scaffolding, prose transcription, statement drafting"
      framework: "Coordinated LLM sessions with local `lake` type-checking against a pinned Mathlib."
