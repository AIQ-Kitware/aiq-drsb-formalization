automation:
  methods:
    - method: "agent"
      description: "AI-drafted Lean statements + prose transcriptions, human-coordinated."
      models:
        - "Claude Opus 4.8 (1M context) — scaffolding, prose transcription, statement drafting"
        - "GPT-5.5 Thinking — sequence-model Cameron–Martin/Kakutani proof authoring and repair overlays (2026-07-08)"
      framework: "Coordinated LLM sessions with local `lake` type-checking against a pinned Mathlib."
      review_status: "Local `lake build` green after the sequence-model Cameron–Martin/Kakutani overlays. The repo remains subject to expert Lean/subject-matter review; path-level Wiener/SDE transport is still explicitly out of scope for the sequence-model theorem."
  resource_accounting:
    rationale: >
      Every commit here is produced by an LLM agent; this block makes the climate
      cost of that work legible. Token counts and model are MEASURED verbatim from
      each agent's session transcript (deduped by message id — the transcript logs a
      message several times with identical usage, so a naive record-sum overcounts
      ~2.6x). A time estimate is derived; energy and carbon are DEFERRED, computed in
      a later pass from the recorded tokens/time and the commit timestamp (which fixes
      the grid's carbon intensity — "how dirty was it" — at that moment).
    schema: "resource-ledger/v1"
    module: "dev/resource_tally/            # self-contained, copy-pasteable (see its README.md)"
    tool: "dev/resource_tally/resource_tally.py"
    ledger: "dev/resource_tally/data/resource-ledger.jsonl"
    lifetime_totals_file: "dev/resource_tally/data/lifetime-totals.yaml"
    unit: "per git commit, attributed per agent session (concurrency-safe; append-only; no double-count, no undercount)"
    measured:
      - "model"
      - "input / cache_write / cache_read / output tokens (deduped by message id)"
      - "server tool calls (web_search, web_fetch)"
      - "wall_clock span of the attributed turns"
    estimated:
      inference_seconds: "output_tokens ÷ throughput (assumption set below)"
    deferred:
      energy_kwh: "from inference_seconds × device_power × PUE, or tokens × per-token energy (factor set TBD)"
      carbon_gco2e: "energy_kwh × grid_intensity(commit_ts, region)"
    assumptions:
