    toolchain: "leanprover/lean4:v4.32.0-rc1"
    mathlib_rev: "e3b73828b03c9961c9b33aa95f1d2dc0dca82028"
    command: "lake exe cache get && lake build"
    expectation: "builds green (8761 jobs); zero warnings; zero `sorry`/`sorryAx`; every audited leaf axiom-clean (propext, Classical.choice, Quot.sound); `#lint` (Batteries, 15 linters) reports zero errors in every namespace."
  repository_build:
    last_user_reported_build: "lake build green 2026-07-10 (8761 jobs, zero warnings). Sinkhorn `hge` proved; both card claims and all four strong-duality capstones edge-free. Challenge layer added 2026-07-10: MathlibCandidate (3) + MathlibPending (5 comparator configs + 2 leaderboard-only); all leaf `#print axioms` verified clean."
    last_user_reported_challenge_summary: "Challenge/comparator layer is NEW and has NOT yet been run under the real landrun comparator. Conformance and Leaderboard modules elaborate, every listed leaf is axiom-clean, and the local pre-flight `scripts/check_comparator_signatures.py` (universe signature + full `pp.all` type, Conformance vs Leaderboard) is the gate that has been exercised. Run `bash scripts/run_challenge_comparator.sh` for the full sweep."
