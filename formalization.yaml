    - declaration: "ForMathlib.MeasureTheory.absolutelyContinuous_stdSeqGaussian_map_add_of_summable"
      informal: "Kakutani/Cameron–Martin absolute-continuity direction for the iid Gaussian sequence model: ℓ² shifts are absolutely continuous."
