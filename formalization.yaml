fidelity:
  known_limitations:
    - >-
      Both evaluation-card claims (Drsb.wdrsb_cost_bound, Drsb.sdrsb_cost_bound) are PROVED and
      EDGE-FREE, as are all four strong-duality capstones. The strong-duality `>=` direction is no
      longer an `hattain`/`hge` hypothesis in either setting; it is proved
      (ForMathlib.OT.dualValue_le_droValue for Wasserstein, WangGaoXie2023.sinkhornDual_le_droValue
      for Sinkhorn). The Sinkhorn proof needs a Slater / strict-feasibility hypothesis in place of
      `hge` -- this is a STATEMENT change, not a proof gap: the entropic objective has no zero, so
      mere feasibility does not place the radius in the interior of the value function's domain.
      Whether entropic duality survives at the boundary eps = inf_gamma obj(gamma) is not established
      here either way. The hypothesis is proved satisfiable
      (ForMathlib.OT.exists_slater_of_couplingCost_prodCoupling_lt), so the capstones are not vacuous.
    - >-
      Research content that remains isolated in named, non-vacuous edges, all OFF the card path:
      worst-case-measure *existence* (GaoKleywegt2023.worstCase_structure_cor1,
      MohajerinEsfahaniKuhn2018.worstCase_exists -- these legitimately assume attainment);
      four `hbddP` hypotheses on worst-case-*structure* theorems that carry no boundedness assumption
      to derive it from; and the continuum Cameron-Martin/Girsanov bridge (hCM), blocked on Mathlib's
      absent Ito integral (grep-confirmed absent; ROADMAP_ENERGY_IDENTITY.md Phase 2).
    - "PROVENANCE RULE: the GaTech team's own DRSB manuscript is NOT a source for this formalization and carries ~0 weight (it was wrong). Its internal labels ('Eq. 47', 'Algorithm 5', drsbm_paper) appear only in GaTech code comments — never published. We anchor solely on the MAGNET cards and the published theorems (Blanchet–Murthy, Gao–Kleywegt, Wang–Gao–Xie, Chen–Georgiou–Pavon). Do not chase or cite the manuscript. The reference/ directory (old TwoPager/PAC-Bayes + drsb scratch) is likewise near-0-weight — mine only for a proof pattern that helps a card-needed theorem."
    - "2026-07-08 theorem-target scaffold: `ChenGeorgiouPavon2021.ProjectTheoremTargets` imports the current global progress-bar theorem targets. A source scan after the scaffold overlay reports 27 executable target placeholders, intended to mark missing mathematical capstones only. Downstream assembly lemmas should be proved from these targets rather than adding separate assembly placeholders."
    - "Heavy analysis objects (SDE path measures, controlled dynamics) are captured via abstract `structure` interfaces, not built from Mathlib SDE theory (which does not exist yet)."
    - "Statements were AI-drafted against prose transcriptions; they still need expert review against the primary sources."
    - "SINKHORN AUDIT (2026-07, FIXED): the Sinkhorn ball (ForMathlib.OT.Wkappa/sinkhornBall) used KL against the product of the two coupling marginals (μ⊗μ̂), but Wang–Gao–Xie Def 1 uses KL against the nominal times an EXTERNAL reference ν (μ̂⊗ν) — the same ν the dual integrates over. The ball and dual referenced different measures, making strong_duality/sdrsb_*/primal_feasible_iff inconsistent. FIXED: Wkappa/sinkhornBall now carry ν and consumers thread it (see prose/sinkhorn-dro-duality.md audit note)."
    - "WangGaoXie2023.primal_feasible_iff RESOLVED (2026-07) → primal_feasible_radius_nonneg. The naive `Nonempty ↔ 0 ≤ ε` is false even against the corrected external-ν ball: Wkappa κ ν μ̂ μ̂ > 0 for a non-degenerate nominal (the entropic term forbids the diagonal coupling), so the ball's true nonemptiness threshold is the free energy −κ·𝔼_μ̂[log ∫ e^{−c/κ} dν] ≥ 0 (generically > 0). Proved the honest necessity half (0 ≤ κ ⇒ Nonempty → 0 ≤ ε). The paper's full ↔ ρ≥0 (Thm 1(I)) holds only for the ρ̄-reformulated KL-ball. This is the same phenomenon that forces the Slater hypothesis in the Sinkhorn strong duality: the entropic ball's nonemptiness threshold is strictly positive."

