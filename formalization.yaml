ForMathlib.MeasureTheory.GaussianCameronMartin now proves `stdSeqGaussian` finite-prefix marginals, 1-D and finite-dimensional shifted-Gaussian densities, prefix local-density and L² density-process bounds, square-summability ⇒ absolute continuity, `klDiv_stdSeqGaussian_map_add_of_summable`, the non-summable/infinite-KL converse, and the finite/top dichotomy wrappers. ChenGeorgiouPavon2021.energy_identity_sequenceModel is the honest CGP-facing sequence-coordinate restatement; it does NOT identify the sequence law with Wiener/SDE path kernels, so the remaining continuum bridge is still M4b path transport, not a closed feedback/Girsanov theorem."
