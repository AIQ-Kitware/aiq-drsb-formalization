    - declaration: "ForMathlib.MeasureTheory.klDiv_stdSeqGaussian_map_add_of_summable"
      informal: "Infinite-dimensional sequence-model Cameron–Martin KL identity: for square-summable c, KL((stdSeqGaussian).map (·+c) ‖ stdSeqGaussian) = ofReal(cmTotalEnergy c)."
